<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧產品設計與IoT物聯網應用課程</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- 基礎 Hero 設定 (完全恢復你提供的原始參數) --- */
        .hero {
            position: relative; 
            overflow: hidden;   
            height: 60vh; /* 確保高度一致 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* --- 你的三圖疊加動畫結構 (完全保留) --- */
        .logo-group {
            position: absolute;   
            left: 60px;        
            bottom: 80px;      
            width: 180px;      
            height: 180px;
            z-index: 5;        
        }

        .Endorsement {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
        }

        .Endorsement img {
            width: 100%;
            display: block;
        }

        #after {
            animation: logo-animation 2s infinite;
        }

        #stick {
            width: 13px; 
            transform: translate(84px, 35px) rotate(3deg); 
            transition-duration: 3s;
            transition-timing-function: cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 2;
        }

        #stick:hover {
            transform: translate(84px, -15px) rotate(3deg);
            opacity: 0.01; 
        }

        #before {
            margin-top: 98px; 
            transform-origin: top;
            animation: logo-animation 2s infinite;
            z-index: 3;
        }

        @keyframes logo-animation {
            0%, 100% { transform: rotate(0deg); }
            25%, 75% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
        }

        /* --- 你的文字顏色變換動畫 --- */
        .hero h1 {
            color: #00d4ff; 
            animation: text-color-change 4s ease-in-out infinite;
            font-size: 3rem; 
            line-height: 1.3;
        }

        @keyframes text-color-change {
            0%, 100% {
                color: #00d4ff;
                text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            }
            50% {
                color: #a64dff;
                text-shadow: 0 0 20px rgba(166, 77, 255, 0.5);
            }
        }

        /* --- 按鈕樣式 --- */
        .hero .btn {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s, color 0.3s;
            background-color: #00d4ff; 
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
        }

        .hero .btn:hover {
            transform: scale(1.15);
            filter: brightness(1.1);
            background-color: #ffcc00;
            color: #333;               
        }

        /* --- 頁尾樣式 --- */
        .main-footer {
            background: #1a2a6c; 
            color: #fff; 
            text-align: center; 
            padding: 30px 0; 
            width: 100%;
            margin-top: 0; /* 緊接在 hero 之後 */
        }

        /* ==========================================
          手機版響應式優化：解決破圖問題
        ========================================== */
        @media (max-width: 768px) {
            .hero {
                height: 70vh; 
            }

            .hero h1 {
                font-size: 1.8rem; 
                padding: 0 15px;
            }

            /* 手機版將圖組置中並縮放，避免與文字重疊或拆散 */
            .logo-group {
                width: 110px;  
                height: 110px;
                left: 50%;     
                transform: translateX(-50%); 
                bottom: 30px;  
            }

            /* 按比例調整手機版 stick 的位置 */
            #stick {
                width: 8px;
                transform: translate(51px, 21px) rotate(3deg); 
            }

            #before {
                margin-top: 60px; /* 縮小後的疊加間距 */
            }
        }

        nav {
            position: relative;
            z-index: 1000;
        }
    </style>
</head>

<body>
   <script src="nav_bar.js"></script>
   <div id="nav_bar"></div>

    <header class="hero">
        <!-- 保持原始結構，確保能讀取到 style.css 裡的背景設定 -->
        <div class="logo-group">
            <div id="after" class="Endorsement"><img src="image/Endorsement_after.png"></div>
            <div id="stick" class="Endorsement"><img src="image/stick.png"></div>
            <div id="before" class="Endorsement"><img src="image/Endorsement_before.png"></div>
        </div>

        <div class="container">
            <h1>掌握物聯網趨勢，<br />
                定義智慧產品新未來。</h1>
            <p>結合硬體開發與雲端應用，打造跨領域 IoT 實務人才的培育搖籃。</p>
            <a href="courses.html" class="btn">查看課程</a>
        </div>
    </header>

    <!-- 正確頁尾 -->
    <footer class="main-footer">
        <p>&copy; 2026 智慧產品與 IOT 物聯網應用班 - 網頁設計作業</p>
    </footer>
</body>

</html>
