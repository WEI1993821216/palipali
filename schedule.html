<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級課表</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            scroll-behavior: smooth;
            background-color: #f4f7f6;
            margin: 0;
        }

        .schedule-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 15px; 
        }

        /* --- 階段切換按鈕 --- */
        .phase-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            position: sticky;
            top: 70px; 
            z-index: 99;
            flex-wrap: wrap; 
            background-color: rgba(244, 247, 246, 0.9); 
            padding: 10px 0;
        }

        .phase-btn {
            background-color: white;
            color: #2c3e50;
            border: 2px solid #3498db;
            padding: 8px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.9em;
            white-space: nowrap; 
        }

        .phase-btn:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-2px);
        }

        .page-block {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            padding: 25px; 
            margin-bottom: 40px;
            border-top: 6px solid #3498db;
            scroll-margin-top: 150px;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            min-width: 600px; 
            border-collapse: collapse;
        }

        th {
            background-color: #f9fafb;
            color: #2c3e50;
            padding: 15px 10px;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
            font-size: 0.95em;
        }

        /* --- 強化的回到頂端按鈕 --- */
        #backToTop {
            display: none; 
            position: fixed;
            bottom: 40px;
            right: 30px;
            z-index: 9999; /* 強制置頂，確保不被表格或導覽列遮住 */
            border: none;
            outline: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            padding: 0;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            font-size: 24px;
            line-height: 50px; /* 文字垂直居中 */
            text-align: center;
        }

        #backToTop:hover {
            background-color: #2980b9;
        }

        /* --- 頁尾樣式 --- */
        .main-footer {
            background: #1a2a6c; 
            color: #fff; 
            text-align: center; 
            padding: 30px 0; 
            width: 100%;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            #backToTop {
                bottom: 25px; /* 手機版略調位置 */
                right: 20px;
                width: 45px;
                height: 45px;
                line-height: 45px;
                font-size: 20px;
                display: none; /* 初始依舊由 JS 控制 */
            }
        }
    </style>
</head>
<body>
    <script src="nav_bar.js"></script>
    <div id="nav_bar"></div>

    <!-- 回到頂端按鈕 -->
    <button onclick="topFunction()" id="backToTop" title="回到頂端">▲</button>

    <div class="schedule-wrapper">
        <h1 style="text-align: center; color: #2c3e50; font-size: 2.2em; margin-bottom: 35px;">階段性課程規劃</h1>

        <div class="phase-nav">
            <a href="#phase1" class="phase-btn">第一階段 (3/27-4/30)</a>
            <a href="#phase2" class="phase-btn">第二階段 (5/01-5/29)</a>
            <a href="#phase3" class="phase-btn">第三階段 (6/01-6/18)</a>
        </div>

        <div id="schedule-display"></div>
    </div>

    <footer class="main-footer">
        <p>&copy; 2026 智慧產品與 IOT 物聯網應用班 - 網頁設計作業</p>
    </footer>

    <script src="data.js"></script>

    <script>
        function createTable(id, title, range, data) {
            let html = `<div class="page-block" id="${id}">
                <h2>${title} <small>${range}</small></h2>
                <div class="table-responsive"> 
                    <table>
                        <thead>
                            <tr>
                                <th width="25%">日期 (星期)</th>
                                <th width="37.5%">上午課程</th>
                                <th width="37.5%">下午課程</th>
                            </tr>
                        </thead>
                        <tbody>`;
            data.forEach(item => {
                html += `<tr><td class="date-cell">${item.date} (${item.week})</td>`;
                if (item.morning === item.afternoon) {
                    html += `<td colspan="2">${item.morning}</td>`;
                } else {
                    html += `<td>${item.morning}</td><td>${item.afternoon}</td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table></div></div>`;
            return html;
        }

        const displayArea = document.getElementById('schedule-display');
        if (typeof page1Data !== 'undefined') {
            displayArea.innerHTML += createTable("phase1", "第一階段：基礎養成", "3/27 - 4/30", page1Data);
            displayArea.innerHTML += createTable("phase2", "第二階段：專業進階", "5/01 - 5/29", page2Data);
            displayArea.innerHTML += createTable("phase3", "第三階段：專題實戰", "6/01 - 6/18", page3Data);
        }

        // --- 強化的捲動顯示邏輯 ---
        var mybutton = document.getElementById("backToTop");

        window.onscroll = function() {
            // 同時偵測不同的捲動數值來源，確保手機瀏覽器相容性
            var scrollVal = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop;
            
            if (scrollVal > 300) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        };

        function topFunction() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
